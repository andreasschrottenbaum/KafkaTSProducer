<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Kafka Producer</title>
  </head>
  <body>
    <header>
      <h1>Kafka Producer</h1>
    </header>
    <main>
      <fieldset>
        <legend>Single Message</legend>

        <form id="single-message-form">
          <label>
            <span>Key:</span>

            <input type="text" name="key" />
          </label>

          <label>
            <span>Payload:</span>

            <textarea name="payload"></textarea>
          </label>

          <button>Send</button>
        </form>
      </fieldset>

      <fieldset>
        <legend>Frequent messages</legend>

        <label>
          <span>Frequent events with JSON</span>
          <input type="checkbox" id="frequent-events" />
        </label>
        <label>
          <span>Interval (ms)</span>
          <input
            type="number"
            min="10"
            max="5000"
            value="1000"
            id="interval-length"
          />
        </label>
      </fieldset>
    </main>
    <footer>
      <p>&copy; 2026 Andreas Schrottenbaum. All rights reserved.</p>
    </footer>

    <script src="/client.js"></script>
  </body>
</html>
